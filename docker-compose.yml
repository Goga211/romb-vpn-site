# Деплой Romb VPN Mini App на promo.bezgraniz.site.
# TLS терминирует внешний remnawave-nginx, проксируя на miniapp:8000
# по внутренней docker-сети remnawave-network (external).
services:
  miniapp:
    build: .
    image: miniapp_vpn:latest
    container_name: miniapp
    hostname: miniapp
    env_file: backend/.env
    # Хранилище обращений (SQLite) в именованном volume — переживает пересборку.
    # Пишет в БД только этот сервис (API); бот к ней не обращается.
    environment:
      DB_PATH: /data/support.db
    volumes:
      - support-data:/data
    restart: always
    networks:
      - remnawave-network
    # Порты наружу не публикуем — nginx ходит по hostname miniapp:8000
    expose:
      - "8000"

  miniapp-bot:
    image: miniapp_vpn:latest
    container_name: miniapp-bot
    working_dir: /app/backend
    command: ["python", "-m", "bot.main"]
    env_file: backend/.env
    # Дедуп напоминаний (notify.db рядом с DB_PATH) — на своём volume, чтобы
    # переживать редеплой и не слать повторные напоминания. support.db бот не
    # трогает; volume отдельный от API, общей записи в один файл нет.
    environment:
      DB_PATH: /data/support.db
    volumes:
      - bot-data:/data
    restart: always
    depends_on:
      - miniapp
    networks:
      - remnawave-network

# Volume создавались старым compose-проектом «miniapp_vpn» — там живут боевые
# support.db/attachments и дедуп напоминаний. Имена фиксируем явно (external),
# иначе compose из каталога romb_vpn создаст пустые romb_vpn_* и «потеряет» базу
# (инцидент 2026-07-07: после пересоздания контейнеров все ловили not auth).
volumes:
  support-data:
    name: miniapp_vpn_support-data
    external: true
  bot-data:
    name: miniapp_vpn_bot-data
    external: true

networks:
  remnawave-network:
    name: remnawave-network
    external: true
